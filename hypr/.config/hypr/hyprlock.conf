# BACKGROUND
background {
    monitor =
    path = /home/omer/Pictures/plitvice-lakes-national-park-backiee-4K.jpg
    blur_passes = 1
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# ==========================================
# THE UNIFIED USER CARD INTERFACE BLOCK
# ==========================================

# 1. Card Background Base (Houses image, user label, and input box)
shape {
    monitor =
    size = 310, 360                  # Card dimensions to cleanly wrap everything
    color = rgba(30, 46, 40, 0.4)   # Semi-transparent dark background card
    rounding = 15                    # Rounded container layout
    border_size = 1
    border_color = rgba(255, 255, 255, 0.15)
    
    position = 0, 0                  # Centered as the primary foundation card
    halign = center
    valign = center
}

# 2. Profile-Photo (Layered safely inside the card box)
image {
    monitor =
    path = /home/omer/Pictures/gowall/3.jpeg
    border_color = 0xffdddddd
    border_size = 2
    size = 100
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd =
    
    position = 0, 95                # Relative offset upward from card center
    halign = center
    valign = center
}

# 3. USER Name Greeting (Layered beneath photo)
label {
    monitor =
    text = ようこそ
    color = rgba(216, 222, 233, 0.90)
    font_size = 22                   # Slightly reduced size to balance the box limits
    font_family = JetBrainsMono Nerd Font Bold
    
    position = 0, 15                 # Relative offset sitting between photo and input
    halign = center
    valign = center
}

# 4. INPUT FIELD (Layered at the bottom of the card)
input-field {
    monitor =
    size = 250, 50                   # Balanced aspect ratio for modern sizing
    outline_thickness = 1
    dots_size = 0.25 
    dots_spacing = 0.3 
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(20, 20, 30, 0.5) # Clean input area contrast
    font_color = rgb(240, 240, 240)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font 
    placeholder_text = <i><span foreground="##ffffff77">Enter Pass</span></i>
    hide_input = false
    
    position = 0, -65                # Positioned relative to card center base
    halign = center
    valign = center
}

# ==========================================
# STATUS & UTILITIES INFO (Outside of Card)
# ==========================================

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M %p")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 40
    font_family = JetBrainsMono Nerd Font Bold
    position = 50, -40
    halign = left
    valign = top
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 16
    font_family = JetBrainsMono Nerd Font 
    position = 50, -120
    halign = left
    valign = top
}

# Battery Status Widget (With charging support)
label {
    text = cmd[update:30000] echo "󰁹 $(cat /sys/class/power_supply/BAT0/capacity)%"
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    color = rgba(255, 255, 255, 0.7)
    position = -50, -50
    halign = right
    valign = top
}

