# --- Subtitle Position & Sizing -----------------------------------------------
Ctrl+UP add sub-pos -1
Ctrl+DOWN add sub-pos +1

Ctrl+1 add sub-font-size 2
Ctrl+2 add sub-font-size -2


# --- Audio Management ---------------------------------------------------------
k add volume 5 
j add volume -5 

a cycle audio


# --- Timeline Seeking & Navigation --------------------------------------------
h seek -5
l seek 5

Ctrl+a seek 0 absolute
Ctrl+m seek 50 absolute-percent 
Ctrl+f seek 100
Ctrl+b seek -100


# --- Display, Subtitle & Video Track Cycles -----------------------------------
Ctrl+i show-progress
g cycle sub

r cycle_values video-rotate 0 90 180 270


# --- Transform Resets ---------------------------------------------------------
Shift+z set video-zoom 0; set video-pan-x 0; set video-pan-y 0; set panscan 0; set video-rotate 0