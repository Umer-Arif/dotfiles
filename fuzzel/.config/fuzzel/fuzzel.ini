# Main Window Constraints
[main]
font=JetBrainsMono Nerd Font:size=13
prompt="❯  "
placeholder="Search apps..."
icon-theme=Papirus-Dark
icons-enabled=yes

# Layout adjustments for a clean centered look
width=40
lines=10
horizontal-pad=25
vertical-pad=15
inner-pad=10

# Match this to your Niri geometry-corner-radius rule
border-radius=12
border-width=2

# Semi-Transparent Color Mappings (Format: RRGGBBAA)
[colors]
# 1a1b26 is the base color; 'dd' triggers ~85% transparency
background=1a1b26dd
text=c0caf5ff

# Text selection strings
match=ff9e64ff
selection-match=ff9e64ff

# Highlights when browsing items 
# 414868 is the selection line; 'cc' gives it a glassy pop over the blur
selection=414868cc
selection-text=c0caf5ff

# Border lines
border=#7fbbb3ff

[border]
radius=12
width=2
